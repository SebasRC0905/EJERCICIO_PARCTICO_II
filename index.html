<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas Avanzado</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <main class="app-container">
        <header class="app-header">
            <p class="eyebrow">Gestor de tareas</p>
            <h1>Mis Pendientes</h1>
            <p id="current-date">Organiza tu día de manera eficiente</p>
        </header>

        <section class="input-section" aria-label="Agregar tarea">
            <div class="form-grid">
                <label class="field">
                    <span>Tarea</span>
                    <input type="text" id="task-input" placeholder="¿Qué necesitas hacer hoy?" autocomplete="off">
                </label>

                <label class="field">
                    <span>Prioridad</span>
                    <select id="priority-select">
                        <option value="baja">Baja</option>
                        <option value="media" selected>Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </label>

                <label class="field">
                    <span>Fecha límite</span>
                    <input type="date" id="due-date-input" aria-label="Fecha de vencimiento" required>
                </label>

                <button id="add-task-btn" type="button">Agregar tarea</button>
            </div>
            <p class="helper-text">Prioridades permitidas: Baja, Media y Alta.</p>
        </section>

        <section class="task-list-section">
            <div class="section-title">
                <h2>Tu lista</h2>
                <span id="task-counter">0 tareas pendientes</span>
            </div>
            <ul id="task-list"></ul>
        </section>

        <footer class="app-footer">
            <button id="clear-all-btn" type="button">Limpiar completadas</button>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
